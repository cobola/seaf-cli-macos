name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            goarch: arm64
          - arch: x86_64
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          CGO_ENABLED=0 GOOS=darwin GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o seaf-cli-macos-${{ matrix.arch }} .

      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          tar -czf seaf-cli-macos-${VERSION}-${{ matrix.arch }}.tar.gz \
            seaf-cli-macos-${{ matrix.arch }}
          shasum -a 256 seaf-cli-macos-${VERSION}-${{ matrix.arch }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seaf-cli-macos-${{ matrix.arch }}
          path: seaf-cli-macos-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
          body: |
            ## seaf-cli-macos ${{ github.ref_name }}

            ### 安装
            ```bash
            # 下载对应架构的包
            tar -xzf seaf-cli-macos-${{ github.ref_name }}-arm64.tar.gz
            cd seaf-cli-macos
            chmod +x bin/seaf-cli
            sudo mv bin/seaf-cli /usr/local/bin/
            ```

            ### 使用
            ```bash
            # 登录（打开浏览器获取 token）
            seaf-cli login --web

            # 账号密码登录
            seaf-cli login

            # 上传文件
            seaf-cli upload <本地目录> <库内路径>
            ```
